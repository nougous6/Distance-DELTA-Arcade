<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Distance DELTA Terminology Boggle</title>
    <style>
        /* --- Branded Design System --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a1628;
            color: #e8f0fe;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            background-image: 
                radial-gradient(circle at 20% 30%, #1a3a6a, #0a1628 80%),
                radial-gradient(circle at 80% 70%, #1a2a4a, transparent 60%);
        }
        .game-container {
            max-width: 700px;
            width: 100%;
            background: rgba(10, 22, 40, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.03);
            max-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header with Logo --- */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid rgba(212, 175, 55, 0.15);
            flex-shrink: 0;
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1;
        }
        .logo .distance {
            font-size: 0.6rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #8a9bb5;
            text-transform: uppercase;
        }
        .logo .delta {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #d4af37, #f5d77b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            margin-top: -2px;
        }
        .logo-divider {
            width: 2px;
            height: 24px;
            background: linear-gradient(to bottom, #d4af37, transparent);
            opacity: 0.3;
        }
        .header h1 {
            font-weight: 500;
            font-size: 0.85rem;
            color: #b0c4e8;
            letter-spacing: -0.3px;
        }
        .header .sub {
            font-size: 0.5rem;
            opacity: 0.5;
            font-weight: 400;
            color: #8a9bb5;
            display: block;
            margin-top: 1px;
        }

        /* --- Stats Bar --- */
        .stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.08);
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.55rem;
        }
        .stat-item .icon {
            font-size: 0.7rem;
        }
        .stat-item .value {
            font-weight: 700;
            color: #f5d77b;
            font-size: 0.7rem;
            min-width: 16px;
        }
        .stat-item .label {
            opacity: 0.5;
            font-weight: 400;
            font-size: 0.5rem;
        }
        .stat-item .score-value {
            font-weight: 700;
            color: #f5d77b;
            font-size: 0.9rem;
        }

        /* --- Progress --- */
        .progress-wrap {
            background: rgba(255, 255, 255, 0.05);
            height: 4px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            flex-shrink: 0;
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #d4af37, #f5d77b);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- Timer --- */
        .timer-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .timer-area .timer-bar-wrap {
            flex: 1;
            max-width: 300px;
            height: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            overflow: hidden;
        }
        .timer-area .timer-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #5adc8c, #f5d77b);
            border-radius: 10px;
            transition: width 0.3s linear;
        }
        .timer-area .timer-bar.warning {
            background: linear-gradient(90deg, #ff6b6b, #f5d77b);
        }
        .timer-area .timer-text {
            font-size: 1rem;
            font-weight: 700;
            color: #f5d77b;
            min-width: 40px;
            text-align: center;
        }

        /* --- Question Area --- */
        .question-area {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 10px;
            text-align: center;
            flex-shrink: 0;
            min-height: 60px;
        }
        .question-area .q-number {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.3;
            margin-bottom: 4px;
        }
        .question-area .q-term {
            font-size: 1.5rem;
            font-weight: 700;
            color: #f5d77b;
            margin: 4px 0;
        }
        .question-area .q-hint {
            font-size: 0.55rem;
            color: #8a9bb5;
            opacity: 0.6;
            margin-top: 2px;
        }
        .question-area .q-example {
            font-size: 0.6rem;
            color: #aab8d0;
            font-style: italic;
            margin-top: 4px;
            opacity: 0.8;
        }

        /* --- Options --- */
        .options-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }
        .opt-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 0.7rem;
            color: #d0dfff;
            cursor: pointer;
            transition: all 0.25s ease;
            text-align: center;
            font-weight: 500;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .opt-btn.hidden {
            color: transparent;
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.04);
            cursor: default;
        }
        .opt-btn.hidden .letter-only {
            color: #8a9bb5;
            font-weight: 700;
            font-size: 0.8rem;
            opacity: 0.5;
        }
        .opt-btn .letter-only {
            display: none;
        }
        .opt-btn.hidden .letter-only {
            display: block;
        }
        .opt-btn.hidden .full-text {
            display: none;
        }
        .opt-btn .full-text {
            display: block;
        }
        .opt-btn:not(.hidden):hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.06);
            border-color: rgba(212, 175, 55, 0.2);
            transform: translateY(-1px);
        }
        .opt-btn:disabled {
            cursor: not-allowed;
            opacity: 0.3;
        }
        .opt-btn.correct {
            background: rgba(90, 220, 140, 0.15);
            border-color: #5adc8c;
            color: #b0ffd0;
            transform: scale(1.02);
        }
        .opt-btn.wrong {
            background: rgba(255, 80, 80, 0.15);
            border-color: #ff6b6b;
            color: #ffb0b0;
        }
        .opt-btn.reveal-correct {
            border-color: rgba(90, 220, 140, 0.3);
            background: rgba(90, 220, 140, 0.05);
        }

        /* --- Feedback --- */
        .feedback {
            text-align: center;
            min-height: 18px;
            font-size: 0.6rem;
            font-weight: 500;
            margin-bottom: 6px;
            flex-shrink: 0;
            padding: 2px 0;
        }
        .feedback .correct-fb {
            color: #5adc8c;
        }
        .feedback .wrong-fb {
            color: #ff6b6b;
        }
        .feedback .info-fb {
            color: #b0c4e8;
        }
        .feedback .win-fb {
            color: #f5d77b;
            font-size: 0.8rem;
        }
        .feedback .time-fb {
            color: #ff6b6b;
            font-weight: 700;
        }

        /* --- Controls --- */
        .controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding-top: 6px;
            border-top: 1px solid rgba(212, 175, 55, 0.06);
            flex-shrink: 0;
        }
        .btn {
            background: rgba(212, 175, 55, 0.08);
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: #f5d77b;
            padding: 4px 16px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 0.6rem;
            backdrop-filter: blur(4px);
        }
        .btn:hover:not(:disabled) {
            background: rgba(212, 175, 55, 0.18);
            transform: scale(1.02);
            border-color: #d4af37;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.08);
        }
        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #d4af37, #b8962e);
            border: none;
            color: #0a1628;
            font-weight: 700;
            font-size: 0.65rem;
            padding: 5px 20px;
            transition: all 0.25s ease;
        }
        .btn-primary:hover:not(:disabled) {
            background: linear-gradient(135deg, #e5c44a, #c4a030);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
        }
        .btn-primary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.08);
            color: #b0c4e8;
        }
        .btn-secondary:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
        }

        /* --- Game Over Modal --- */
        .gameover-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .gameover-overlay.active {
            opacity: 1;
        }
        .gameover-modal {
            background: linear-gradient(145deg, #0f2240, #0a1628);
            padding: 28px 32px;
            border-radius: 28px;
            max-width: 400px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(212, 175, 55, 0.1);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            animation: modalPopIn 0.4s ease;
        }
        @keyframes modalPopIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .gameover-modal .result-icon {
            font-size: 52px;
            line-height: 1.2;
        }
        .gameover-modal h2 {
            font-size: 1.5rem;
            margin: 4px 0 2px;
            font-weight: 600;
        }
        .gameover-modal .subtitle {
            opacity: 0.6;
            margin-bottom: 14px;
            color: #b0c4e8;
            font-size: 0.85rem;
        }
        .gameover-modal .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
            margin: 12px 0 16px;
        }
        .gameover-modal .stat-box {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 10px 4px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .gameover-modal .stat-box .num {
            font-size: 1.3rem;
            font-weight: 700;
            color: #f5d77b;
            display: block;
        }
        .gameover-modal .stat-box .lbl {
            font-size: 0.55rem;
            opacity: 0.5;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .gameover-modal .btn {
            font-size: 0.8rem;
            padding: 8px 32px;
        }

        /* --- Responsive --- */
        @media(max-width: 450px) {
            .game-container {
                padding: 10px;
                border-radius: 18px;
            }
            .question-area {
                padding: 10px 12px;
                min-height: 48px;
            }
            .question-area .q-term {
                font-size: 1.2rem;
            }
            .options-area {
                gap: 4px;
            }
            .opt-btn {
                font-size: 0.6rem;
                padding: 8px 10px;
                border-radius: 8px;
                min-height: 40px;
            }
            .header h1 {
                font-size: 0.7rem;
            }
            .logo .delta {
                font-size: 0.9rem;
            }
            .stats-bar {
                padding: 3px 8px;
            }
            .stat-item {
                font-size: 0.5rem;
            }
            .feedback {
                font-size: 0.55rem;
                min-height: 16px;
            }
            .timer-area .timer-text {
                font-size: 0.85rem;
                min-width: 30px;
            }
            .gameover-modal {
                padding: 20px 18px;
            }
            .gameover-modal h2 {
                font-size: 1.2rem;
            }
        }
        @media(max-height: 700px) {
            .game-container {
                padding: 8px;
            }
            .header {
                margin-bottom: 4px;
                padding-bottom: 4px;
            }
            .stats-bar {
                padding: 2px 8px;
                margin-bottom: 4px;
            }
            .question-area {
                padding: 8px 12px;
                min-height: 40px;
                margin-bottom: 6px;
            }
            .question-area .q-term {
                font-size: 1.2rem;
            }
            .options-area {
                margin-bottom: 4px;
            }
            .opt-btn {
                padding: 6px 10px;
                font-size: 0.55rem;
                min-height: 34px;
            }
            .controls {
                padding-top: 4px;
            }
            .feedback {
                min-height: 14px;
                font-size: 0.5rem;
                margin-bottom: 2px;
            }
            .timer-area {
                margin-bottom: 4px;
            }
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Header -->
        <div class="header">
            <div class="brand">
                <div class="logo">
                    <span class="distance">The</span>
                    <span class="distance" style="font-size:0.5rem;letter-spacing:2px;margin-top:-1px;">Distance</span>
                    <span class="delta">DELTA</span>
                </div>
                <div class="logo-divider"></div>
                <div>
                    <h1>Terminology Boggle</h1>
                    <span class="sub">Reading &amp; Listening • 20 Terms</span>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-item">
                <span class="icon">⭐</span>
                <span class="label">Score:</span>
                <span class="score-value" id="scoreDisplay">0</span>
            </div>
            <div class="stat-item">
                <span class="icon">✅</span>
                <span class="label">Correct:</span>
                <span class="score-value" id="correctDisplay">0</span>
                <span class="label">/</span>
                <span id="totalDisplay">20</span>
            </div>
            <div class="stat-item">
                <span class="icon">🔥</span>
                <span class="label">Streak:</span>
                <span class="score-value" id="streakDisplay">0</span>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Timer -->
        <div class="timer-area">
            <div class="timer-bar-wrap">
                <div class="timer-bar" id="timerBar"></div>
            </div>
            <div class="timer-text" id="timerText">20s</div>
        </div>

        <!-- Question Area -->
        <div class="question-area">
            <div class="q-number" id="qNumber">Round 1 of 20</div>
            <div class="q-term" id="qTerm">Click <span style="color:#d0dfff;font-weight:400;">"Start Round"</span></div>
            <div class="q-hint" id="qHint">Match the term to its definition</div>
            <div class="q-example" id="qExample"></div>
        </div>

        <!-- Options -->
        <div class="options-area" id="optionsArea">
            <button class="opt-btn hidden" data-index="0"><span class="letter-only">A</span><span class="full-text">Definition A</span></button>
            <button class="opt-btn hidden" data-index="1"><span class="letter-only">B</span><span class="full-text">Definition B</span></button>
            <button class="opt-btn hidden" data-index="2"><span class="letter-only">C</span><span class="full-text">Definition C</span></button>
            <button class="opt-btn hidden" data-index="3"><span class="letter-only">D</span><span class="full-text">Definition D</span></button>
        </div>

        <!-- Feedback -->
        <div class="feedback" id="feedback">
            <span class="info-fb" id="feedbackText">Press <strong>"Start Round"</strong> to begin!</span>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn btn-secondary" onclick="resetGame()">🔄 New Game</button>
            <button class="btn btn-primary" id="startBtn" onclick="startRound()">🚀 Start Round</button>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div class="gameover-overlay" id="gameoverOverlay">
        <div class="gameover-modal">
            <div class="result-icon" id="resultIcon">🏆</div>
            <h2 id="resultTitle">Time's Up!</h2>
            <p class="subtitle" id="resultSubtitle">You got 0 out of 20 correct!</p>
            <div class="stats-grid">
                <div class="stat-box">
                    <span class="num" id="finalScore">0</span>
                    <span class="lbl">Score</span>
                </div>
                <div class="stat-box">
                    <span class="num" id="finalCorrect">0/20</span>
                    <span class="lbl">Correct</span>
                </div>
                <div class="stat-box">
                    <span class="num" id="finalStreak">0</span>
                    <span class="lbl">Best Streak</span>
                </div>
            </div>
            <button class="btn btn-primary" onclick="document.getElementById('gameoverOverlay').style.display='none'; resetGame();">🔄 Play Again</button>
        </div>
    </div>

    <script>
        // --- DATA: 20 Reading & Listening Terms ---
        const ALL_TERMS = [
            { term: "Authentic Text", definition: "A text written for native speakers, not adapted for language learners.", example: "📌 A newspaper article, a film script, or a novel – materials created for real-world communication." },
            { term: "Genre Approach", definition: "Teaching writing by focusing on different text types (genres) and their structures.", example: "📌 Teaching learners how to write a formal letter, a report, or a narrative by analysing the typical features of each genre." },
            { term: "Product Approach", definition: "A writing approach where learners study and imitate a model text.", example: "📌 Learners analyse a model essay and then write their own essay following the same structure and style." },
            { term: "Process Approach", definition: "A writing approach that emphasizes planning, drafting, revising, and editing.", example: "📌 Learners brainstorm ideas, write a first draft, receive feedback, revise, edit, and then produce a final version." },
            { term: "Bottom-Up Processing", definition: "Understanding language by focusing on sounds, words, and grammar first.", example: "📌 Decoding a sentence word by word, recognising individual phonemes, and using grammatical knowledge to build meaning." },
            { term: "Top-Down Processing", definition: "Understanding language by using background knowledge, context, and predictions.", example: "📌 Predicting the content of a text from its title or using knowledge of the topic to interpret meaning." },
            { term: "Interactional Listening", definition: "Listening to social conversations where the focus is on relationships.", example: "📌 Listening to a friend talk about their day – the goal is social bonding, not information exchange." },
            { term: "Interactive Listening", definition: "Engaging in two-way conversations where both listening and responding are needed.", example: "📌 A classroom discussion where learners listen to each other and respond in real time." },
            { term: "Non-Interactive Listening", definition: "Listening without responding, such as to a podcast or lecture.", example: "📌 Listening to a recorded lecture or a radio programme without needing to reply." },
            { term: "Transactional Listening", definition: "Listening to get specific information or complete a task.", example: "📌 Listening to a train announcement to find your platform or listening to instructions to complete a task." },
            { term: "Co-Text", definition: "The words and sentences surrounding a particular word or phrase.", example: "📌 In the sentence 'He was feeling blue,' the co-text helps clarify that 'blue' refers to sadness, not the colour." },
            { term: "Contextual Knowledge", definition: "Understanding language through social, cultural, or situational context.", example: "📌 Knowing that saying 'I'm fine' in response to 'How are you?' is a social convention, not necessarily a factual statement." },
            { term: "Decoding", definition: "Translating written or spoken symbols into meaning.", example: "📌 Recognising that the letters /k/, /æ/, /t/ combine to form the word 'cat'." },
            { term: "Meaning Building", definition: "The process of understanding and constructing meaning from language.", example: "📌 A learner reads a sentence and uses decoding skills and background knowledge to understand the overall message." },
            { term: "Schematic Knowledge", definition: "Background knowledge about how things work, used in comprehension.", example: "📌 Understanding that a menu contains food options and prices helps a learner navigate a restaurant menu." },
            { term: "Systemic Knowledge", definition: "Understanding how language works structurally (e.g., grammar, phonology).", example: "📌 Knowing that 'I have been living' is present perfect continuous because of the auxiliary 'have' and the '-ing' form." },
            { term: "Extensive Reading/Listening", definition: "Reading or listening to large amounts of text for general comprehension, often outside the classroom.", example: "📌 Reading a novel for pleasure or listening to a podcast series – the focus is on enjoyment and general understanding." },
            { term: "Intensive Reading/Listening", definition: "Reading or listening carefully for detailed understanding, often inside the classroom.", example: "📌 Analysing a short text line by line to understand vocabulary, grammar, and meaning in detail." },
            { term: "Scanning", definition: "Looking for specific information in a text.", example: "📌 Looking at a train timetable to find the departure time of a specific train." },
            { term: "Skimming", definition: "Quickly reading to understand the main points.", example: "📌 Reading the introduction and conclusion of an article, and the first sentence of each paragraph, to get an overview." }
        ];

        // --- GAME STATE ---
        let gameState = {
            currentIndex: 0,
            score: 0,
            correctCount: 0,
            streak: 0,
            bestStreak: 0,
            totalQuestions: 20,
            currentTerm: null,
            gameActive: false,
            answered: false,
            timer: null,
            timeLeft: 20,
            maxTime: 20,
            shuffledTerms: [],
            roundStarted: false,
            optionsRevealed: false
        };

        const $ = id => document.getElementById(id);

        // --- SHUFFLE FUNCTION ---
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // --- INITIALISE GAME ---
        function initGame() {
            gameState.shuffledTerms = shuffleArray([...ALL_TERMS]);
            gameState.currentIndex = 0;
            gameState.score = 0;
            gameState.correctCount = 0;
            gameState.streak = 0;
            gameState.bestStreak = 0;
            gameState.gameActive = false;
            gameState.roundStarted = false;
            gameState.answered = false;
            gameState.optionsRevealed = false;
            gameState.timeLeft = gameState.maxTime;

            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }

            $('scoreDisplay').textContent = '0';
            $('correctDisplay').textContent = '0';
            $('streakDisplay').textContent = '0';
            $('totalDisplay').textContent = ALL_TERMS.length;
            $('progressBar').style.width = '0%';
            $('timerBar').style.width = '100%';
            $('timerText').textContent = '20s';
            $('timerBar').classList.remove('warning');
            document.getElementById('gameoverOverlay').style.display = 'none';
            document.getElementById('gameoverOverlay').classList.remove('active');

            showQuestion(false);
            $('feedbackText').textContent = 'Press <strong>"Start Round"</strong> to begin!';
            $('feedbackText').className = 'info-fb';
            $('startBtn').textContent = '🚀 Start Round';
            $('startBtn').disabled = false;
            gameState.roundStarted = false;

            // Hide options
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.add('hidden');
                b.disabled = true;
            });
        }

        // --- SHOW QUESTION ---
        function showQuestion(startTimer) {
            if (gameState.currentIndex >= gameState.totalQuestions) {
                endGame(true);
                return;
            }

            const term = gameState.shuffledTerms[gameState.currentIndex];
            gameState.currentTerm = term;
            gameState.answered = false;

            $('qNumber').textContent = `Round ${gameState.currentIndex + 1} of ${gameState.totalQuestions}`;
            $('qTerm').textContent = term.term;
            $('qHint').textContent = 'Match the term to its definition';
            $('qExample').textContent = term.example || '';

            // Build options: 1 correct, 3 wrong
            const wrongTerms = ALL_TERMS.filter(t => t.term !== term.term);
            const shuffledWrong = shuffleArray([...wrongTerms]);
            const options = [term.definition];
            const wrongOptions = shuffledWrong.slice(0, 3).map(t => t.definition);
            while (wrongOptions.length < 3) {
                wrongOptions.push("A different definition");
            }
            options.push(...wrongOptions);
            const shuffledOptions = shuffleArray([...options]);
            const correctIndex = shuffledOptions.indexOf(term.definition);

            const optContainer = $('optionsArea');
            optContainer.innerHTML = '';
            const letters = ['A', 'B', 'C', 'D'];
            shuffledOptions.forEach((text, index) => {
                const btn = document.createElement('button');
                btn.className = 'opt-btn hidden';
                btn.dataset.index = index;
                btn.dataset.correct = (index === correctIndex) ? 'true' : 'false';
                btn.innerHTML = `<span class="letter-only">${letters[index]}</span><span class="full-text">${letters[index]}. ${text}</span>`;
                btn.onclick = () => handleAnswer(btn, index, correctIndex);
                optContainer.appendChild(btn);
            });

            // Hide options
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.add('hidden');
                b.disabled = true;
            });

            gameState.optionsRevealed = false;

            // Reset feedback
            $('feedbackText').textContent = 'Press "Start Round" to reveal the options!';
            $('feedbackText').className = 'info-fb';
            $('startBtn').textContent = '🚀 Start Round';
            $('startBtn').disabled = false;
            gameState.roundStarted = false;

            // Reset timer display
            $('timerBar').style.width = '100%';
            $('timerText').textContent = '20s';
            $('timerBar').classList.remove('warning');
        }

        // --- START ROUND ---
        function startRound() {
            if (gameState.roundStarted) return;
            if (gameState.currentIndex >= gameState.totalQuestions) {
                resetGame();
                return;
            }

            gameState.gameActive = true;
            gameState.roundStarted = true;
            gameState.optionsRevealed = true;
            gameState.timeLeft = gameState.maxTime;
            $('startBtn').textContent = '⏳ In Progress...';
            $('startBtn').disabled = true;

            // Reveal options
            document.querySelectorAll('.opt-btn').forEach(b => {
                b.classList.remove('hidden');
                b.disabled = false;
            });

            $('feedbackText').textContent = 'Choose the correct definition!';
            $('feedbackText').className = 'info-fb';

            // Start timer
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            updateTimerDisplay();
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                updateTimerDisplay();
                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timer);
                    gameState.timer = null;
                    timeUp();
                }
            }, 1000);
        }

        // --- UPDATE TIMER ---
        function updateTimerDisplay() {
            const pct = (gameState.timeLeft / gameState.maxTime) * 100;
            $('timerBar').style.width = pct + '%';
            $('timerText').textContent = gameState.timeLeft + 's';
            if (gameState.timeLeft <= 5) {
                $('timerBar').classList.add('warning');
            } else {
                $('timerBar').classList.remove('warning');
            }
        }

        // --- TIME UP ---
        function timeUp() {
            if (gameState.answered) return;
            gameState.gameActive = false;
            gameState.answered = true;

            // Reveal correct answer
            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => {
                b.disabled = true;
                if (b.dataset.correct === 'true') {
                    b.classList.add('reveal-correct');
                }
            });

            $('feedbackText').textContent = '⏰ Time\'s up! The answer was: ' + gameState.currentTerm.definition;
            $('feedbackText').className = 'time-fb';

            // Reset streak
            gameState.streak = 0;
            $('streakDisplay').textContent = '0';

            setTimeout(() => {
                moveToNext();
            }, 3000); // Increased to 3 seconds
        }

        // --- HANDLE ANSWER ---
        function handleAnswer(btn, selectedIndex, correctIndex) {
            if (gameState.answered || !gameState.gameActive) return;
            gameState.answered = true;

            // Stop timer
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }

            const allBtns = document.querySelectorAll('.opt-btn');
            allBtns.forEach(b => b.disabled = true);

            const isCorrect = (selectedIndex === correctIndex);

            if (isCorrect) {
                btn.classList.add('correct');
                gameState.correctCount++;
                gameState.streak++;
                if (gameState.streak > gameState.bestStreak) {
                    gameState.bestStreak = gameState.streak;
                }
                const bonus = Math.min(gameState.streak * 2, 20);
                gameState.score += 10 + bonus;
                $('scoreDisplay').textContent = gameState.score;
                $('correctDisplay').textContent = gameState.correctCount;
                $('streakDisplay').textContent = gameState.streak;
                $('progressBar').style.width = ((gameState.currentIndex + 1) / gameState.totalQuestions * 100) + '%';

                $('feedbackText').textContent = `✅ Correct! +${10 + bonus} points ${gameState.streak > 1 ? '(Streak x' + gameState.streak + '!)' : ''}`;
                $('feedbackText').className = 'correct-fb';

            } else {
                btn.classList.add('wrong');
                allBtns.forEach(b => {
                    if (b.dataset.correct === 'true') {
                        b.classList.add('reveal-correct');
                    }
                });
                gameState.streak = 0;
                $('streakDisplay').textContent = '0';
                $('feedbackText').textContent = '❌ Wrong! The answer was: ' + gameState.currentTerm.definition;
                $('feedbackText').className = 'wrong-fb';
            }

            gameState.gameActive = false;

            setTimeout(() => {
                moveToNext();
            }, 3000); // Increased to 3 seconds
        }

        // --- MOVE TO NEXT ---
        function moveToNext() {
            gameState.currentIndex++;
            gameState.roundStarted = false;
            gameState.optionsRevealed = false;
            $('startBtn').textContent = '🚀 Start Round';
            $('startBtn').disabled = false;

            if (gameState.currentIndex >= gameState.totalQuestions) {
                endGame(true);
            } else {
                showQuestion(false);
                $('feedbackText').textContent = 'Press "Start Round" to continue!';
                $('feedbackText').className = 'info-fb';
                $('startBtn').disabled = false;
            }
        }

        // --- END GAME ---
        function endGame(completed) {
            gameState.gameActive = false;
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }

            const overlay = $('gameoverOverlay');
            overlay.style.display = 'flex';
            void overlay.offsetWidth;
            overlay.classList.add('active');

            const pct = (gameState.correctCount / gameState.totalQuestions) * 100;

            if (pct === 100) {
                $('resultIcon').textContent = '🏆';
                $('resultTitle').textContent = 'Perfect Score!';
                $('resultTitle').style.color = '#f5d77b';
                $('resultSubtitle').textContent = 'You got every single term correct! Amazing!';
            } else if (pct >= 80) {
                $('resultIcon').textContent = '🥈';
                $('resultTitle').textContent = 'Excellent!';
                $('resultTitle').style.color = '#5adc8c';
                $('resultSubtitle').textContent = `You got ${gameState.correctCount} out of ${gameState.totalQuestions} correct!`;
            } else if (pct >= 60) {
                $('resultIcon').textContent = '🥉';
                $('resultTitle').textContent = 'Good Effort!';
                $('resultTitle').style.color = '#b0c4e8';
                $('resultSubtitle').textContent = `You got ${gameState.correctCount} out of ${gameState.totalQuestions} correct. Keep practising!`;
            } else {
                $('resultIcon').textContent = '📚';
                $('resultTitle').textContent = 'Keep Learning!';
                $('resultTitle').style.color = '#8a9bb5';
                $('resultSubtitle').textContent = `You got ${gameState.correctCount} out of ${gameState.totalQuestions} correct. Review and try again!`;
            }

            $('finalScore').textContent = gameState.score;
            $('finalCorrect').textContent = `${gameState.correctCount}/${gameState.totalQuestions}`;
            $('finalStreak').textContent = gameState.bestStreak;
        }

        // --- RESET GAME ---
        function resetGame() {
            if (gameState.timer) {
                clearInterval(gameState.timer);
                gameState.timer = null;
            }
            document.getElementById('gameoverOverlay').style.display = 'none';
            document.getElementById('gameoverOverlay').classList.remove('active');
            initGame();
        }

        // --- START ---
        initGame();
    </script>
</body>
</html>
